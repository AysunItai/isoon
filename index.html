<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      ============================================
      ⚠️  REPLACE the SITE_URL below with your real
          domain once deployed (e.g. https://isoon.ai).
          OG/Twitter image URLs MUST be absolute for
          Facebook, LinkedIn, X, WhatsApp, Slack, etc.
      ============================================
    -->
    <link rel="canonical" href="https://www.isoon.io/" />

    <title>Isoon — AI email automation for small businesses</title>
    <meta
      name="description"
      content="Isoon reads your inbox, understands customer requests, and prepares professional replies automatically. Schedule a free consultation."
    />
    <meta name="theme-color" content="#00160f" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/browserlogo.png" />
    <link rel="apple-touch-icon" href="/browserlogo.png" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, iMessage, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Isoon" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://www.isoon.io/" />
    <meta
      property="og:title"
      content="Isoon — AI email automation for small businesses"
    />
    <meta
      property="og:description"
      content="Isoon reads your inbox, understands customer requests, and prepares professional replies automatically."
    />
    <meta
      property="og:image"
      content="https://www.isoon.io/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Isoon — automated email workflow"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Isoon — AI email automation for small businesses"
    />
    <meta
      name="twitter:description"
      content="Isoon reads your inbox, understands customer requests, and prepares professional replies automatically."
    />
    <meta
      name="twitter:image"
      content="https://www.isoon.io/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="Isoon — automated email workflow"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
